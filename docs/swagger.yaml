basePath: /api/v1
definitions:
  dto.BookingResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      medical_info:
        type: string
      notes:
        type: string
      payment_method:
        type: string
      people_count:
        type: integer
      phone_number:
        type: string
      price:
        type: integer
      status:
        type: string
      tour_id:
        type: string
      tour_title:
        type: string
    type: object
  dto.CreateBookingRequest:
    properties:
      medical_info:
        type: string
      notes:
        type: string
      payment_method:
        type: string
      people_count:
        type: integer
      phone_number:
        type: string
      tour_id:
        type: string
    type: object
  dto.CreateTourRequest:
    properties:
      country:
        type: string
      description:
        type: string
      image_url:
        type: string
      includes:
        type: string
      location:
        type: string
      price:
        type: integer
      season:
        type: string
      title:
        type: string
    type: object
  dto.TourCardResponse:
    properties:
      country:
        type: string
      id:
        type: string
      image_url:
        type: string
      location:
        type: string
      price:
        type: integer
      season:
        type: string
      title:
        type: string
    type: object
  dto.TourDetailResponse:
    properties:
      country:
        type: string
      description:
        type: string
      id:
        type: string
      image_url:
        type: string
      includes:
        type: string
      location:
        type: string
      price:
        type: integer
      season:
        type: string
      title:
        type: string
    type: object
  dto.UpdateTourRequest:
    properties:
      country:
        type: string
      description:
        type: string
      image_url:
        type: string
      includes:
        type: string
      location:
        type: string
      price:
        type: integer
      season:
        type: string
      title:
        type: string
